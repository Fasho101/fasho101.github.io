<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Fasho101 - Builder & Director Mode</title>
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Fasho101's Project</h1>
        <button id="toggleMode">Switch Mode</button>
    </header>
    <main>
        <div id="builderMode" class="mode">
            <h2>Builder Mode</h2>
            <label for="uploadPhoto">Upload Photo:</label>
            <input type="file" id="uploadPhoto" name="uploadPhoto" accept="image/*">
            <label for="songSelection">Select a Song:</label>
            <select id="songSelection" name="songSelection">
                <option value="song1.mp3">Song 1</option>
                <option value="song2.mp3">Song 2</option>
                <option value="song3.mp3">Song 3</option>
            </select>
            <label for="sceneDescription">Scene Description:</label>
            <textarea id="sceneDescription" name="sceneDescription"></textarea>
        </div>
        <div id="directorMode" class="mode hidden">
            <h2>Director Mode</h2>
            <p>Scene settings and configurations.</p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Fasho101. All Rights Reserved.</p>
    </footer>
    <script>
        document.getElementById('toggleMode').addEventListener('click', function() {
            var builderMode = document.getElementById('builderMode');
            var directorMode = document.getElementById('directorMode');
            builderMode.classList.toggle('hidden');
            directorMode.classList.toggle('hidden');
        });
    </script>
</body>
</html>
